name: Deploy Stockfish Server to Render

on:
  push:
    branches:
      - main
    paths:
      - 'server/**'
      - 'render.yaml'
      - 'Dockerfile'
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        working-directory: server
        run: npm ci

      - name: TypeScript compilation
        working-directory: server
        run: npm run build

      - name: Install Stockfish
        run: sudo apt-get update && sudo apt-get install -y stockfish

      - name: Local health check
        working-directory: server
        run: |
          npm start &
          SERVER_PID=$!
          sleep 5
          curl -f http://localhost:3001/health || exit 1
          curl -f -X POST http://localhost:3001/evaluate \
            -H "Content-Type: application/json" \
            -d '{"fen":"rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1","depth":10}' || exit 1
          kill $SERVER_PID 2>/dev/null || true

      - name: Success notification
        run: echo "✅ Build and tests passed! Render Blueprint will auto-deploy."