name: Deploy Stockfish Server to Render

on:
  push:
    branches:
      - main
    paths:
      - 'server/**'
      - 'render.yaml'
      - 'Dockerfile'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        working-directory: server
        run: npm ci

      - name: TypeScript compilation
        working-directory: server
        run: npm run build

      - name: Success
        run: echo "✅ Build successful! Render Blueprint will deploy the server."