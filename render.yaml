# render.yaml - Render Deployment with Docker
# Stockfish requires native binary, so we use Docker with Alpine

services:
  - type: web
    name: chessduo-stockfish
    region: oregon
    plan: free
    dockerfilePath: Dockerfile
    buildContext: .
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 3001
      - key: NODE_ENV
        value: production
      - key: STOCKFISH_WORKERS
        value: 4
      - key: STOCKFISH_DEPTH
        value: 5
