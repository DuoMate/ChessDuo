# render.yaml - ChessDuo Frontend Deployment
# For FE Render service: chessduo-frontend

services:
  - type: web
    name: chessduo-frontend
    region: ohio
    plan: free
    rootDirectory: /
    buildCommand: npm run build
    startCommand: npx next start -p 3000
    healthCheckPath: /healthz
    envVars:
      - key: PORT
        value: "3000"
      - key: NODE_ENV
        value: production
